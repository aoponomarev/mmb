name: Guardrails

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: UTF-8 enforcement check
        run: python scripts/enforce_utf8.py

      - name: SSOT guardrails check
        run: python scripts/check_ssot_guardrails.py

      - name: Fallback observability check
        run: python scripts/check_fallback_observability.py
