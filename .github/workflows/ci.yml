name: Target App CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  premerge-gates:
    name: Pre-merge Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup environment variables
        run: |
          cp .env.example .env
          echo "DATA_PLANE_ACTIVE_APP=TARGET" >> .env
          echo "SYS_SECRET_ARCHIVE_KEY=dummy-key-for-ci-tests-that-needs-to-be-long-enough-for-aes-256" >> .env

      - name: Install deps
        run: npm install

      - name: Pre-merge gate suite
        if: github.event_name == 'pull_request'
        run: npm run testing:premerge

      - name: Full release gate suite
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: npm run testing:ci

      - name: Collect monitoring snapshot on failure
        if: failure()
        run: npm run monitoring:snapshot

      - name: Upload monitoring snapshot artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: monitoring-snapshot
          path: is/logs/monitoring-health.jsonl
