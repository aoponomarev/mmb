name: Target App CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  testing-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup environment variables
        run: |
          # Use testing dummy keys for CI since real keys are kept via Secret Resilience
          cp .env.example .env
          echo "DATA_PLANE_ACTIVE_APP=TARGET" >> .env
          echo "SYS_SECRET_ARCHIVE_KEY=dummy-key-for-ci-tests-that-needs-to-be-long-enough-for-aes-256" >> .env

      - name: Install deps
        run: npm install

      - name: Preflight checks (Health, Contracts, Lints)
        run: npm run preflight

      - name: Full Test Suite
        run: npm run test
